<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cube Tanks Online</title>
  <style>
    :root {
      --text: #1a2435;
      --card: #ffffff;
      --border: #d2dbea;
      --accent: #127a6d;
      --accent-2: #0e5f79;
      --muted: #63738a;
      --danger: #c13232;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 14%, #def1ff 0%, transparent 35%),
        radial-gradient(circle at 78% 16%, #d8ffec 0%, transparent 40%),
        linear-gradient(180deg, #f9fcff 0%, #eef5ff 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .app {
      width: 100%;
      max-width: 1200px;
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--card);
      box-shadow: 0 14px 35px rgba(35, 54, 80, 0.12);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      color: #fff;
      padding: 16px 20px;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
    }

    .header p {
      margin: 6px 0 0;
      opacity: 0.92;
      font-size: 14px;
    }

    .content {
      padding: 16px;
      display: grid;
      gap: 12px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      background: #fff;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    input {
      height: 36px;
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 0 10px;
      min-width: 130px;
      font-size: 14px;
    }

    button {
      border: none;
      background: var(--accent);
      color: #fff;
      border-radius: 9px;
      height: 36px;
      padding: 0 12px;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover { filter: brightness(0.95); }

    .status { color: var(--muted); font-size: 14px; }
    .status.error { color: var(--danger); }

    .arena-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      background: #d9efff;
    }

    .arena {
      width: 100%;
      display: block;
      aspect-ratio: 3 / 2;
      background: linear-gradient(180deg, #d9efff 0%, #edf7ff 45%, #dff1df 45%, #d1e8d1 100%);
    }

    ul {
      margin: 8px 0 0;
      list-style: none;
      padding: 0;
      display: grid;
      gap: 6px;
      max-height: 220px;
      overflow: auto;
    }

    li {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 7px 9px;
      display: flex;
      justify-content: space-between;
      font-size: 14px;
    }

    .hint {
      font-size: 13px;
      color: var(--muted);
    }

    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 8px;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Cube Tanks Online</h1>
      <p>Топ-даун арена: двигайся по X/Y и стреляй, пока не останется один</p>
    </div>

    <div class="content">
      <div class="card">
        <div class="row">
          <input id="nameInput" placeholder="Ваш ник" maxlength="32" />
          <button id="createBtn">Создать комнату</button>
        </div>
        <div class="settings-grid">
          <input id="playerSpeedInput" type="number" min="120" max="1000" step="10" value="320" title="Скорость танка" />
          <input id="bulletSpeedInput" type="number" min="200" max="2200" step="10" value="900" title="Скорость пули" />
          <input id="fireCooldownInput" type="number" min="0.05" max="2" step="0.01" value="0.22" title="КД стрельбы (сек)" />
          <input id="bulletDamageInput" type="number" min="1" max="100" step="1" value="25" title="Урон пули" />
          <input id="maxHpInput" type="number" min="20" max="500" step="5" value="100" title="HP игрока" />
          <input id="respawnDelayInput" type="number" min="1" max="10" step="0.1" value="2.5" title="Задержка перезапуска (сек)" />
        </div>
        <div class="hint">Эти параметры задает только создатель комнаты при создании.</div>
        <div class="row" style="margin-top:8px">
          <input id="roomInput" placeholder="Код комнаты" maxlength="12" />
          <button id="joinBtn">Подключиться</button>
        </div>
      </div>

      <div class="card">
        <div class="row"><strong>Комната:</strong> <span id="roomLabel">-</span></div>
        <div class="row"><strong>Параметры:</strong> <span id="configLabel">-</span></div>
        <div id="status" class="status" style="margin-top:6px">Не подключено</div>
        <div class="hint" style="margin-top:6px">Управление: WASD или стрелки - движение, Space - выстрел</div>
      </div>

      <div class="arena-wrap">
        <canvas id="arena" class="arena" width="1500" height="1000"></canvas>
      </div>

      <div class="card">
        <strong>Онлайн игроки</strong>
        <ul id="players"></ul>
      </div>
    </div>
  </div>

  <script>
    const nameInput = document.getElementById('nameInput');
    const roomInput = document.getElementById('roomInput');
    const createBtn = document.getElementById('createBtn');
    const joinBtn = document.getElementById('joinBtn');
    const roomLabel = document.getElementById('roomLabel');
    const configLabel = document.getElementById('configLabel');
    const statusEl = document.getElementById('status');
    const playersEl = document.getElementById('players');
    const canvas = document.getElementById('arena');
    const ctx = canvas.getContext('2d');

    const playerSpeedInput = document.getElementById('playerSpeedInput');
    const bulletSpeedInput = document.getElementById('bulletSpeedInput');
    const fireCooldownInput = document.getElementById('fireCooldownInput');
    const bulletDamageInput = document.getElementById('bulletDamageInput');
    const maxHpInput = document.getElementById('maxHpInput');
    const respawnDelayInput = document.getElementById('respawnDelayInput');

    let ws = null;
    let roomId = null;
    let playerId = null;
    let ownerId = null;
    let lastState = null;
    let roomConfig = null;

    const input = { left: false, right: false, up: false, down: false, shoot: false };

    function setStatus(text, isError = false) {
      statusEl.textContent = text;
      statusEl.className = isError ? 'status error' : 'status';
    }

    function getName() {
      const name = (nameInput.value || '').trim();
      return name || 'Игрок';
    }

    function clampNumber(raw, min, max, fallback) {
      const v = Number(raw);
      if (Number.isNaN(v)) return fallback;
      return Math.min(max, Math.max(min, v));
    }

    function collectCreateConfig() {
      return {
        player_speed: clampNumber(playerSpeedInput.value, 120, 1000, 320),
        bullet_speed: clampNumber(bulletSpeedInput.value, 200, 2200, 900),
        fire_cooldown: clampNumber(fireCooldownInput.value, 0.05, 2, 0.22),
        bullet_damage: Math.round(clampNumber(bulletDamageInput.value, 1, 100, 25)),
        max_hp: Math.round(clampNumber(maxHpInput.value, 20, 500, 100)),
        respawn_delay: clampNumber(respawnDelayInput.value, 1, 10, 2.5)
      };
    }

    function renderConfig() {
      if (!roomConfig) {
        configLabel.textContent = '-';
        return;
      }
      configLabel.textContent =
        `speed ${roomConfig.player_speed}, bullet ${roomConfig.bullet_speed}, cd ${roomConfig.fire_cooldown}s, dmg ${roomConfig.bullet_damage}, hp ${roomConfig.max_hp}`;
    }

    function renderPlayers(players) {
      playersEl.innerHTML = '';
      for (const p of players) {
        const li = document.createElement('li');
        const me = p.player_id === playerId ? ' (Вы)' : '';
        const owner = p.player_id === ownerId ? ' [создатель]' : '';
        const state = p.alive ? 'в бою' : 'уничтожен';
        li.innerHTML = `<span>${p.name}${me}${owner} - ${state}</span><span>HP: ${p.hp} | Победы: ${p.wins}</span>`;
        playersEl.appendChild(li);
      }
    }

    function drawGrid(width, height, sx, sy) {
      ctx.strokeStyle = '#b8d2ea';
      ctx.lineWidth = 1;
      const step = 120;
      for (let x = 0; x <= width; x += step) {
        ctx.beginPath();
        ctx.moveTo(x * sx, 0);
        ctx.lineTo(x * sx, canvas.height);
        ctx.stroke();
      }
      for (let y = 0; y <= height; y += step) {
        ctx.beginPath();
        ctx.moveTo(0, y * sy);
        ctx.lineTo(canvas.width, y * sy);
        ctx.stroke();
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      if (!lastState) {
        requestAnimationFrame(draw);
        return;
      }

      const world = lastState.world;
      const sx = canvas.width / world.width;
      const sy = canvas.height / world.height;
      const hpMax = (lastState.config && lastState.config.max_hp) || 100;

      ctx.fillStyle = '#d9efff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      drawGrid(world.width, world.height, sx, sy);

      for (const b of lastState.bullets) {
        ctx.beginPath();
        ctx.fillStyle = '#1f2937';
        ctx.arc(b.x * sx, b.y * sy, 4, 0, Math.PI * 2);
        ctx.fill();
      }

      for (const p of lastState.players) {
        const isMe = p.player_id === playerId;
        const x = p.x * sx;
        const y = p.y * sy;
        const size = world.player_size * sx;

        ctx.fillStyle = p.alive ? (isMe ? '#1d4ed8' : '#dc2626') : '#6b7280';
        ctx.fillRect(x, y, size, size);

        ctx.strokeStyle = '#0f172a';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x + size / 2, y + size / 2);
        ctx.lineTo(x + size / 2 + p.facing_x * 18, y + size / 2 + p.facing_y * 18);
        ctx.stroke();

        const hpRatio = Math.max(0, p.hp) / hpMax;
        ctx.fillStyle = '#e5e7eb';
        ctx.fillRect(x, y - 10, size, 6);
        ctx.fillStyle = '#16a34a';
        ctx.fillRect(x, y - 10, size * hpRatio, 6);

        ctx.fillStyle = '#0f172a';
        ctx.font = '12px Segoe UI';
        ctx.fillText(p.name, x, y - 14);
      }

      requestAnimationFrame(draw);
    }

    function connectSocket() {
      if (ws) ws.close();

      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${protocol}://${location.host}/ws/${roomId}?player_id=${playerId}`);

      ws.onopen = () => {
        setStatus('Подключено. Ждем других игроков...');
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        if (msg.type === 'game_state') {
          lastState = msg;
          ownerId = msg.owner_id;
          roomConfig = msg.config || roomConfig;
          roomLabel.textContent = msg.room_id;
          renderConfig();
          renderPlayers(msg.players);
          if (!msg.ready_to_play) {
            setStatus('Для старта нужно минимум 2 онлайн игрока');
          }
        } else if (msg.type === 'round_over') {
          setStatus(msg.message || 'Раунд завершен');
        } else if (msg.type === 'round_reset') {
          setStatus(msg.message || 'Новый раунд начался');
        } else if (msg.type === 'error') {
          setStatus(msg.message || 'Ошибка', true);
        }
      };

      ws.onclose = () => {
        setStatus('Соединение закрыто', true);
      };

      ws.onerror = () => {
        setStatus('Ошибка WebSocket', true);
      };
    }

    async function createRoom() {
      const res = await fetch('/api/create-room', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: getName(),
          ...collectCreateConfig()
        })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Не удалось создать комнату');
      roomId = data.room_id;
      playerId = data.player_id;
      ownerId = data.owner_id;
      roomConfig = data.config || null;
      renderConfig();
      roomInput.value = roomId;
      connectSocket();
    }

    async function joinRoom() {
      const code = (roomInput.value || '').trim().toUpperCase();
      if (!code) throw new Error('Введите код комнаты');

      const res = await fetch('/api/join-room', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ room_id: code, name: getName() })
      });

      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Не удалось подключиться');
      roomId = data.room_id;
      playerId = data.player_id;
      ownerId = data.owner_id;
      roomConfig = data.config || null;
      renderConfig();
      connectSocket();
    }

    function sendInput() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'input', ...input }));
    }

    function bindControls() {
      window.addEventListener('keydown', (e) => {
        if (e.code === 'KeyA' || e.code === 'ArrowLeft') input.left = true;
        if (e.code === 'KeyD' || e.code === 'ArrowRight') input.right = true;
        if (e.code === 'KeyW' || e.code === 'ArrowUp') input.up = true;
        if (e.code === 'KeyS' || e.code === 'ArrowDown') input.down = true;
        if (e.code === 'Space') input.shoot = true;
      });

      window.addEventListener('keyup', (e) => {
        if (e.code === 'KeyA' || e.code === 'ArrowLeft') input.left = false;
        if (e.code === 'KeyD' || e.code === 'ArrowRight') input.right = false;
        if (e.code === 'KeyW' || e.code === 'ArrowUp') input.up = false;
        if (e.code === 'KeyS' || e.code === 'ArrowDown') input.down = false;
        if (e.code === 'Space') input.shoot = false;
      });

      setInterval(sendInput, 40);
    }

    createBtn.addEventListener('click', async () => {
      try {
        setStatus('Создаем комнату...');
        await createRoom();
      } catch (e) {
        setStatus(e.message || 'Ошибка', true);
      }
    });

    joinBtn.addEventListener('click', async () => {
      try {
        setStatus('Подключаемся...');
        await joinRoom();
      } catch (e) {
        setStatus(e.message || 'Ошибка', true);
      }
    });

    bindControls();
    requestAnimationFrame(draw);
  </script>
</body>
</html>
