<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Камень Ножницы Бумага Онлайн</title>
  <style>
    :root {
      --card: #ffffff;
      --text: #182433;
      --accent: #0d8a73;
      --accent-dark: #0b6f5d;
      --border: #d8e1ee;
      --muted: #63738a;
      --danger: #c13232;
      --warn: #9a6c00;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 15% 15%, #d8ecff 0%, transparent 35%),
        radial-gradient(circle at 85% 20%, #d7ffe8 0%, transparent 40%),
        linear-gradient(180deg, #f8fbff 0%, #eef4ff 100%);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 760px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 14px 35px rgba(39, 55, 78, 0.12);
      overflow: hidden;
    }

    .header {
      padding: 20px;
      background: linear-gradient(135deg, #0d8a73 0%, #0a6380 100%);
      color: #fff;
    }

    .header h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0.3px;
    }

    .header p {
      margin: 6px 0 0;
      opacity: 0.9;
      font-size: 14px;
    }

    .content {
      padding: 20px;
      display: grid;
      gap: 16px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      background: #fff;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    input {
      height: 38px;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0 12px;
      font-size: 14px;
      color: var(--text);
      min-width: 140px;
    }

    button {
      border: none;
      border-radius: 10px;
      height: 38px;
      padding: 0 16px;
      font-size: 14px;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      transition: background 120ms ease;
    }

    button:hover { background: var(--accent-dark); }
    button:disabled { opacity: 0.5; cursor: default; }

    .moves button {
      font-size: 18px;
      min-width: 110px;
      height: 46px;
    }

    .status { color: var(--muted); }
    .status.error { color: var(--danger); }
    .status.warn { color: var(--warn); }

    ul {
      margin: 8px 0 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 6px;
    }

    li {
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 8px 10px;
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .result {
      font-size: 15px;
      font-weight: 600;
    }

    @media (max-width: 640px) {
      .moves button {
        flex: 1;
        min-width: 0;
      }

      input { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Камень · Ножницы · Бумага</h1>
      <p>Создай комнату и сыграй 1 на 1 в браузере</p>
    </div>

    <div class="content">
      <div class="card">
        <div class="row">
          <input id="nameInput" placeholder="Ваш ник" maxlength="32" />
          <input id="targetScoreInput" type="number" min="1" max="15" value="3" title="До скольки побед" />
          <button id="createBtn">Создать комнату</button>
        </div>
        <div class="row" style="margin-top:10px">
          <input id="roomInput" placeholder="Код комнаты" maxlength="12" />
          <button id="joinBtn">Подключиться</button>
        </div>
      </div>

      <div class="card">
        <div class="row"><strong>Комната:</strong> <span id="roomLabel">-</span></div>
        <div class="row" style="margin-top:6px"><strong>Матч до:</strong> <span id="targetLabel">-</span> побед</div>
        <div id="status" class="status" style="margin-top:6px">Не подключено</div>
      </div>

      <div class="card">
        <strong>Игроки</strong>
        <ul id="players"></ul>
      </div>

      <div class="card">
        <strong>Ход</strong>
        <div class="row moves" style="margin-top:10px">
          <button data-move="rock" disabled>Камень</button>
          <button data-move="scissors" disabled>Ножницы</button>
          <button data-move="paper" disabled>Бумага</button>
        </div>
        <div class="row" style="margin-top:10px">
          <button id="rematchBtn" disabled>Реванш</button>
        </div>
        <div class="result" id="result" style="margin-top:12px">Результат раунда появится здесь</div>
      </div>
    </div>
  </div>

  <script>
    const nameInput = document.getElementById('nameInput');
    const targetScoreInput = document.getElementById('targetScoreInput');
    const roomInput = document.getElementById('roomInput');
    const createBtn = document.getElementById('createBtn');
    const joinBtn = document.getElementById('joinBtn');
    const roomLabel = document.getElementById('roomLabel');
    const targetLabel = document.getElementById('targetLabel');
    const statusEl = document.getElementById('status');
    const playersEl = document.getElementById('players');
    const resultEl = document.getElementById('result');
    const rematchBtn = document.getElementById('rematchBtn');
    const moveButtons = [...document.querySelectorAll('[data-move]')];

    let ws = null;
    let roomId = null;
    let playerId = null;
    let playersCache = [];
    let matchWinner = null;
    let rematchRequestedBy = [];

    function setStatus(text, kind = 'normal') {
      statusEl.textContent = text;
      if (kind === 'error') {
        statusEl.className = 'status error';
      } else if (kind === 'warn') {
        statusEl.className = 'status warn';
      } else {
        statusEl.className = 'status';
      }
    }

    function getName() {
      const n = (nameInput.value || '').trim();
      return n || 'Игрок';
    }

    function getTargetScore() {
      const raw = Number(targetScoreInput.value || '3');
      if (Number.isNaN(raw)) return 3;
      return Math.min(15, Math.max(1, Math.floor(raw)));
    }

    function setMovesEnabled(enabled) {
      moveButtons.forEach(b => b.disabled = !enabled);
    }

    function updateRematchButton(statePlayers) {
      const connectedCount = statePlayers.filter(p => p.connected).length;
      const canAsk = Boolean(matchWinner) && connectedCount === 2;
      rematchBtn.disabled = !canAsk;

      if (!canAsk) {
        return;
      }
      if (rematchRequestedBy.includes(playerId)) {
        setStatus('Ожидание подтверждения реванша от соперника', 'warn');
      }
    }

    function renderPlayers(players) {
      playersCache = players;
      playersEl.innerHTML = '';
      for (const p of players) {
        const li = document.createElement('li');
        const me = p.player_id === playerId ? ' (Вы)' : '';
        const left = `${p.name}${me} ${p.connected ? 'Онлайн' : 'Оффлайн'} ${p.has_move ? '• ход сделан' : ''}`;
        const right = `Счет: ${p.score}`;
        li.innerHTML = `<span>${left}</span><span>${right}</span>`;
        playersEl.appendChild(li);
      }
    }

    function connectSocket() {
      if (ws) {
        ws.close();
      }
      const protocol = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${protocol}://${location.host}/ws/${roomId}?player_id=${playerId}`);

      ws.onopen = () => {
        setStatus('Подключено. Ждем второго игрока или ход.');
      };

      ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);

        if (msg.type === 'state') {
          roomLabel.textContent = msg.room_id;
          targetLabel.textContent = msg.target_score;
          matchWinner = msg.match_winner;
          rematchRequestedBy = msg.rematch_requested_by || [];

          renderPlayers(msg.players);
          setMovesEnabled(Boolean(msg.ready_to_play));
          updateRematchButton(msg.players);

          if (!msg.ready_to_play && !matchWinner) {
            setStatus('Комната активна. Нужно 2 подключенных игрока.');
          }
        } else if (msg.type === 'round_result') {
          const entries = Object.entries(msg.moves).map(([pid, move]) => {
            const p = playersCache.find(x => x.player_id === pid);
            return `${p ? p.name : pid}: ${move}`;
          });

          if (!msg.winner) {
            resultEl.textContent = `Ничья. ${entries.join(' | ')}`;
          } else {
            const w = playersCache.find(x => x.player_id === msg.winner);
            resultEl.textContent = `Раунд: победил ${w ? w.name : msg.winner}. ${entries.join(' | ')}`;
          }
        } else if (msg.type === 'match_over') {
          resultEl.textContent = `Матч завершен. Победитель: ${msg.winner_name}. Нажмите "Реванш".`;
          setStatus(`Матч до ${msg.target_score} побед завершен`, 'warn');
          setMovesEnabled(false);
          rematchBtn.disabled = false;
        } else if (msg.type === 'match_reset') {
          resultEl.textContent = 'Новый матч начался. Делайте ход.';
          setStatus(msg.message || 'Новый матч начался');
        } else if (msg.type === 'error') {
          setStatus(msg.message || 'Ошибка', 'error');
        } else if (msg.type === 'info') {
          setStatus(msg.message || 'Инфо', 'warn');
        }
      };

      ws.onclose = () => {
        setMovesEnabled(false);
        rematchBtn.disabled = true;
        setStatus('Соединение закрыто', 'error');
      };

      ws.onerror = () => {
        setStatus('Ошибка WebSocket', 'error');
      };
    }

    async function createRoom() {
      const res = await fetch('/api/create-room', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name: getName(),
          target_score: getTargetScore()
        })
      });

      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.detail || 'Не удалось создать комнату');
      }

      roomId = data.room_id;
      playerId = data.player_id;
      roomInput.value = roomId;
      targetLabel.textContent = data.target_score;
      connectSocket();
    }

    async function joinRoom() {
      const entered = (roomInput.value || '').trim().toUpperCase();
      if (!entered) {
        throw new Error('Введите код комнаты');
      }

      const res = await fetch('/api/join-room', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ room_id: entered, name: getName() })
      });

      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.detail || 'Не удалось подключиться');
      }

      roomId = data.room_id;
      playerId = data.player_id;
      targetLabel.textContent = data.target_score;
      connectSocket();
    }

    createBtn.addEventListener('click', async () => {
      try {
        setStatus('Создаем комнату...');
        await createRoom();
      } catch (e) {
        setStatus(e.message || 'Ошибка', 'error');
      }
    });

    joinBtn.addEventListener('click', async () => {
      try {
        setStatus('Подключаемся...');
        await joinRoom();
      } catch (e) {
        setStatus(e.message || 'Ошибка', 'error');
      }
    });

    moveButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        if (!ws || ws.readyState !== WebSocket.OPEN) {
          setStatus('Нет активного соединения', 'error');
          return;
        }
        ws.send(JSON.stringify({ type: 'move', move: btn.dataset.move }));
        setStatus('Ход отправлен. Ждем соперника...');
      });
    });

    rematchBtn.addEventListener('click', () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) {
        setStatus('Нет активного соединения', 'error');
        return;
      }
      ws.send(JSON.stringify({ type: 'rematch_request' }));
      setStatus('Запрос реванша отправлен', 'warn');
    });
  </script>
</body>
</html>
